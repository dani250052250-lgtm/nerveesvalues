<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nervees Values</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<h1>🌙 Nervees Values</h1>

<p>Adopt Me Value Calculator</p>

</header>



<!-- ПОИСК -->

<section class="search-box">

<input 
id="search"
type="text"
placeholder="🔍 Search pets, vehicles, pet wear..."
>

</section>





<!-- КАТЕГОРИИ -->

<nav class="categories">


<button data-category="pets">
🐾 Pets
</button>


<button data-category="vehicles">
🚗 Vehicles
</button>


<button data-category="pet_wear">
👒 Pet Wear
</button>


<button data-category="toys">
🧸 Toys
</button>


<button data-category="eggs">
🥚 Eggs
</button>


<button data-category="gifts">
🎁 Gifts
</button>


</nav>





<!-- СПИСОК ПРЕДМЕТОВ -->

<h2 id="category-title">
🔥 Popular Items
</h2>


<section id="items">

</section>







<!-- КАЛЬКУЛЯТОР -->


<section class="calculator-box">


<h2>
⚖️ Trade Calculator
</h2>



<div class="trade-container">



<div class="trade-side">

<h3>
Your Offer
</h3>


<div id="your-items">

</div>


<h3>

🧪

<span id="your-total">
0
</span>

</h3>


</div>







<div class="trade-side">


<h3>
Their Offer
</h3>


<div id="their-items">

</div>



<h3>

🧪

<span id="their-total">
0
</span>


</h3>


</div>



</div>





<h2 id="trade-result">

Waiting...

</h2>



</section>








<!-- ИЗБРАННОЕ -->

<section>

<h2>
❤️ Favorites
</h2>


<div id="favorites">

</div>


</section>






<!-- ОБНОВЛЕНИЯ -->


<section>


<h2>
📈 Value Updates
</h2>


<div id="updates">

</div>

<canvas id="priceChart"></canvas>
  
</section>








<script src="js/app.js"></script>

<script src="js/calculator.js"></script>

<script src="js/search.js"></script>

<script src="js/favorites.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/history-chart.js"></script>
  
</body>

  </html>
